version: '3.9'

services:

  # ─── INFRASTRUCTURE ───────────────────────────────────────────

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "12345678"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost",
             "-U", "Ecom", "-P", "12345678", "-Q", "SELECT 1"]
      interval: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_health"]
      interval: 15s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI → http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      retries: 10

  # ─── SERVICES ───────────────────────────────────────────

  identity-service:
    build:
      context: ./backend/services/http://localhost:5000
      dockerfile: Dockerfile
    ports:
      - "5001:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=ECommerce_Identity;User Id=Ecom;Password=12345678;TrustServerCertificate=True
      - Jwt__Secret=REPLACE_WITH_32+_CHAR_RANDOM_SECRET_FROM_KEY_VAULT
      - Jwt__Issuer=http://localhost:5000
      - Jwt__Audience=http://localhost:5000
      - AllowedOrigins=http://localhost:4200
    depends_on:
      sqlserver:
        condition: service_healthy

  product-service:
    build:
      context: ./backend/services/ECommerce.ProductService
      dockerfile: Dockerfile
    ports:
      - "5002:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=ECommerce_Products;User Id=Ecom;Password=12345678;TrustServerCertificate=True
      - Elasticsearch__Url=http://elasticsearch:9200
      - Jwt__Secret=REPLACE_WITH_32+_CHAR_RANDOM_SECRET_FROM_KEY_VAULT
      - Jwt__Issuer=http://localhost:5000
      - Jwt__Audience=http://localhost:5000
      - AllowedOrigins=http://localhost:5000
    depends_on:
      sqlserver:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  cart-service:
    build:
      context: ./backend/services/ECommerce.CartService
      dockerfile: Dockerfile
    ports:
      - "5004:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Redis=redis:6379
      - Services__ProductServiceUrl=http://product-service:80
      - Jwt__Secret=REPLACE_WITH_32+_CHAR_RANDOM_SECRET_FROM_KEY_VAULT
      - Jwt__Issuer=http://localhost:5000
      - Jwt__Audience=http://localhost:5000
    depends_on:
      redis:
        condition: service_healthy
      product-service:
        condition: service_started

  api-gateway:
    build:
      context: ./backend/gateway/ECommerce.ApiGateway
      dockerfile: Dockerfile
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Jwt__Secret=REPLACE_WITH_32+_CHAR_RANDOM_SECRET_FROM_KEY_VAULT
      - Jwt__Issuer=http://localhost:5000
      - Jwt__Audience=http://localhost:5000
      - AllowedOrigins=http://localhost:4200
    depends_on:
      - identity-service
      - product-service
      - cart-service

  order-service:
     build:
      context: ./backend/services/ECommerce.OrderService
      dockerfile: Dockerfile
     ports:
       - "5003:80"
     environment:
        - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=ECommerce_Orders;User Id=Ecom;Password=12345678;TrustServerCertificate=True
        - RabbitMQ__Host=rabbitmq
        - RabbitMQ__Username=guest
        - RabbitMQ__Password=guest
        - Jwt__Secret=MySuperSecretKey@2024!XyZ#123456789
        - Jwt__Issuer=ECommerce.IdentityService
        - Jwt__Audience=ECommerce.Client
     depends_on:
       sqlserver:
        condition: service_healthy
       rabbitmq:
        condition: service_healthy

  payment-service:
     build:
      context: ./backend/services/ECommerce.PaymentService
      dockerfile: Dockerfile
     ports:
       - "5005:80"
     environment:
       - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=ECommerce_Payments;User Id=sa;Password=12345678;TrustServerCertificate=True
       - Stripe__SecretKey=sk_test_YOUR_KEY
       - Stripe__WebhookSecret=whsec_YOUR_SECRET
       - RabbitMQ__Host=rabbitmq
       - RabbitMQ__Username=guest
       - RabbitMQ__Password=guest
       - Jwt__Secret=MySuperSecretKey@2024!XyZ#123456789
       - Jwt__Issuer=ECommerce.IdentityService
       - Jwt__Audience=ECommerce.Client
     depends_on:
       sqlserver:
        condition: service_healthy
       rabbitmq:
        condition: service_healthy

# ─── VOLUMES ───────────────────────────────────────────

volumes:
  sqlserver_data:
  redis_data:
  es_data:
  rabbitmq_data: